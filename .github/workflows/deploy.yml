name: Build and Deploy to Infomaniak

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-and-deploy
  cancel-in-progress: true

jobs:
  build:
    name: Build Nuxt App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        env:
          NUXT_APP_BASE_URL: /livestream-overlays/
        run: npm run generate

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: output
          path: .output/public/
          if-no-files-found: error

  deploy:
    name: Deploy to Infomaniak
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: output
          path: .output/public/

      - name: Deploy via rsync
        uses: Burnett01/rsync-deployments@v9
        with:
          switches: -avzr --delete
          path: .output/public/
          remote_path: ~/sites/site.tchoukball.ch/livestream-overlays/
          remote_host: ${{ vars.INFOMANIAK_SSH_HOST }}
          remote_user: ${{ vars.INFOMANIAK_SSH_USERNAME }}
          remote_key: ${{ secrets.INFOMANIAK_SSH_PRIVATE_KEY }}
          remote_key_pass: ${{ secrets.INFOMANIAK_SSH_PASSPHRASE }}
